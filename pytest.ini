# ─────────────────────────────────────────────────────────────────
# pytest.ini: Configuración central de pytest
# ─────────────────────────────────────────────────────────────────
[pytest]
# Rutas donde pytest buscará archivos de prueba
testpaths = pruebas

# Modo asíncrono automático para pruebas con async/await
asyncio_mode = auto

# Formato de salida: verbose con colores
addopts = -v --tb=short

# Carpeta donde pytest-bdd buscará los archivos .feature
bdd_features_base_dir = pruebas/bdd
