# ─────────────────────────────────────────────────────────────────────────────
# Pipeline de CI: .github/workflows/ci.yml
#
# Propósito: Automatizar la verificación de calidad de código en cada push o
# pull request a las ramas principales.
#
# Pasos ejecutados:
#   1. Pruebas unitarias y BDD con cobertura
#   2. Análisis de código con SonarCloud (incluye análisis estático)
# ─────────────────────────────────────────────────────────────────────────────

name: CI – Proyecto Calidad Software

env:
  SONAR_USER_HOME: ${{ github.workspace }}/.sonar
  GIT_DEPTH: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Job 1: Pruebas Unitarias y BDD con Coverage ──────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    container:
      image: python:3.11

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas con coverage
        run: |
          pytest pruebas/unitarias pruebas/bdd \
            --cov-config=.coveragerc \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Publicar coverage.xml como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

  # ── Job 2: Análisis con SonarCloud ───────────────────────────────────────
  sonarcloud-check:
    name: SonarCloud Check
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Clonar repositorio con full history para SonarCloud
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar coverage.xml
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: Cache de SonarCloud
        uses: actions/cache@v4
        with:
          path: .sonar/cache
          key: ${{ runner.os }}-sonar-${{ github.job }}
          restore-keys: ${{ runner.os }}-sonar-

      - name: Analizar con SonarCloud
        uses: SonarSource/sonarqube-scan-action@0303d6b62e310685c0e34d0b9cde218036885c4d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 3: Pruebas de Carga K6 (Smoke) ───────────────────────────────────
  k6-smoke-test:
    name: K6 Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Levantar API con Docker Compose
        run: docker compose up -d webapp

      - name: Esperar a que la API esté lista
        run: |
          echo "Esperando a la API..."
          for i in {1..10}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "API lista!"
              break
            fi
            sleep 3
          done

      - name: Ejecutar K6 Smoke Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: pruebas/carga/smoke.js
          flags: --env API_URL=http://localhost:8000

